name: Welcome PR

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.type != 'Bot'
    steps:
      - name: Post welcome comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            const body = [
              `Thank you @${author} for taking the time to contribute to this project!`,
              '',
              'A maintainer will review your changes as soon as possible.',
              '',
              'In the meantime, please make sure that:',
              '- Your PR description clearly explains the purpose of the changes',
              '- All existing tests continue to pass',
              '- New tests have been added for any new functionality/flag',
              '',
              'If you have any questions, feel free to ask in this thread.',
              '',
              '[kOaDT](https://github.com/kOaDT)'
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
